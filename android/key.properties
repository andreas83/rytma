# Release signing for Metro Power.
#
# NOTE: This keystore is committed intentionally so CI produces a consistently
# signed, sideloadable APK that upgrades cleanly across builds. It is fine for a
# personal/hobby app, but it is NOT secret — anyone with this repo can sign apps
# as "Metro Power". Before publishing to the Play Store, generate your own
# private keystore and inject it via CI secrets instead.
storePassword=metropower
keyPassword=metropower
keyAlias=metro
storeFile=metro-release.jks
