name: Build APK

# Builds the Android release APK on GitHub-hosted runners, which have full
# internet access (Android SDK + Google Maven) unlike the web sandbox.
on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rytma-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # Publish the raw .apk to a rolling "app-latest" release so it can be
      # downloaded and installed directly on a phone (no zip to unpack).
      - name: Publish APK to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: Rytma — latest build
          body: >
            Automated build from ${{ github.sha }}.
            Download and open `app-release.apk` on your Android device to install.
          files: build/app/outputs/flutter-apk/app-release.apk
